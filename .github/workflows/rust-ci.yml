name: FREAX_DIS

on:
  workflow_dispatch:
    inputs:
      desk:
        description: 'Desktop type'
        required: true
        default: 'LXQt'
        type: string

jobs:
  ubuntu-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 345

    steps:
      - name: Update system
        run: |
          sudo apt update

      - name: Install Dependencies
        run: |
          echo DOWNLOADS
          sudo apt install -y \
            x11vnc xvfb \
            dbus-x11 \
            curl wget unzip \
            net-tools
            
      - name: Install LXQt
        if: inputs.desk == 'LXQt'
        run: |
          sudo apt install -y lxqt-core sddm lxqt-session
          # Optional: lightdm or sddm, but for VNC you might just need the session

      - name: Install XFCE
        if: inputs.desk == 'XFCE'
        run: |
          sudo apt install -y xfce4 xfce4-goodies

      - name: Start virtual display
        run: |
          export DISPLAY=:0
          Xvfb :0 -screen 0 1920x1080x24 &
          sleep 3

      - name: Start desktop
        run: |
          export DISPLAY=:0
          if [ "${{ inputs.desk }}" = "LXQt" ]; then
            startlxqt &
          elif [ "${{ inputs.desk }}" = "XFCE" ]; then
            startxfce4 &
          else
            echo "Unknown desktop: ${{ inputs.desk }}"
            exit 1
          fi
          sleep 5

      - name: Start VNC server
        run: |
          export DISPLAY=:0
          x11vnc \
            -display :0 \
            -nopw \
            -forever \
            -shared \
            -rfbport 5900 &
          sleep 3

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscaled &
          sleep 5
          # 1. Your Base64 encoded key
          base64Key="dHNrZXktYXV0aC1rR2pmdFZ2dWVFMTFDTlRSTC1oUWpaSzJxZHBMaE56dEdLYlVXeUxoVFltSDc1eTJLTA=="
          # 2. Decode the key 
          # NOTICE: Linux uses lowercase '-d' for decoding
          authKey=$(echo -n "$base64Key" | base64 -d)
          echo "Auth key successfully decoded on Linux."
          # 3. Run Tailscale Up
          # Using sudo is standard for Linux network changes
          sudo tailscale up --authkey="$authKey" --hostname=linux-host
          tailscale ip -4
          # docker run -it --rm --name windows -e "VERSION=11" -p 8006:8006 --device=/dev/kvm --device=/dev/net/tun --cap-add NET_ADMIN -v "${PWD:-.}/windows:/storage" --stop-timeout 120 docker.io/dockurr/windows

      - name: Install sshx
        run: |
          curl -sSf https://sshx.io/get | sh
          echo "=== SSHX URL BELOW ==="
          sshx 2>&1 &

      - name: Download Sunshine
        run: |
          wget https://github.com/LizardByte/Sunshine/releases/download/v2025.924.154138/sunshine-ubuntu-24.04-amd64.deb -O sunshine.deb

      - name: Install Sunshine
        run: |
          sudo apt install -y ./sunshine.deb || true

      - name: Run Sunshine
        run: |
          sunshine &
          sleep 5
          ps aux | grep sunshine || true
          wget https://github.com/rustdesk/rustdesk/releases/download/1.4.5/rustdesk-1.4.5-x86_64.deb
          sudo apt install ./rustdesk*deb
          rustdesk &
          

      - name: Keep alive (5h 45m)
        run: |
          echo "Keeping runner alive..."
          echo "End time: $(date -d '+5 hours 45 minutes')"

          for i in $(seq 1 345); do
            echo "Minute $i / 345 â€” $(date)"
            sleep 60
          done
